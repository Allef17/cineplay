<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detalhes</title>
<style>
body{margin:0;background:#000;color:white;font-family:Arial}
.banner{height:60vh;background-size:cover}
.content{padding:20px}
.btn{background:#E50914;border:none;padding:10px;color:white;cursor:pointer}
</style>
</head>

<body>

<div class="banner" id="banner"></div>

<div class="content">
<h1 id="title"></h1>
<p id="desc"></p>
<button class="btn" id="play">Assistir</button>
</div>

<script>

const id = new URLSearchParams(location.search).get("id");

async function load(){

  const data = await fetch('./content/movies.json').then(r=>r.json());

  const item = data.find(i=>i.id===id);

  document.getElementById("banner").style.backgroundImage =
    `url(${item.banner})`;

  document.getElementById("title").innerText = item.title;
  document.getElementById("desc").innerText = item.description;

  document.getElementById("play").onclick = ()=>{
    window.location.href = "player.html?url="+encodeURIComponent(item.embed);
  }

}

load();

</script>

</body>
</html>
