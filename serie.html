<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Detalhes</title>

<style>

body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

.banner{
  height:50vh;
  background-size:cover;
  background-position:center;
}

.content{
  padding:20px;
}

.ep{
  padding:15px;
  background:#222;
  margin:10px;
  cursor:pointer;
}

.ep:hover{
  background:#E50914;
}

.btn{
  background:#E50914;
  border:none;
  padding:10px 20px;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="banner" id="banner"></div>

<div class="content">
  <h1 id="title"></h1>
  <p id="desc"></p>

  <button class="btn" id="play">Assistir</button>

  <div id="episodes"></div>
</div>

<script>

const id = new URLSearchParams(location.search).get("id");

let DATA;

async function load(){

  DATA = await fetch('./content/movies.json').then(r=>r.json());

  const item = DATA.find(i=>i.id===id);

  document.getElementById("banner").style.backgroundImage =
    `url(${item.banner})`;

  document.getElementById("title").innerText = item.title;
  document.getElementById("desc").innerText = item.description;

  document.getElementById("play").onclick = () => {

    if(item.type==="movie"){
      window.location.href="player.html?url="+encodeURIComponent(item.embed);
    }

  }

  if(item.type==="serie"){

    item.seasons.forEach(s=>{
      s.episodes.forEach(e=>{
        document.getElementById("episodes").innerHTML += `
          <div class="ep" onclick="play('${e.embed}')">
            EP ${e.ep} - ${e.title}
          </div>
        `;
      });
    });

  }

}

function play(url){
  window.location.href="player.html?url="+encodeURIComponent(url);
}

load();

</script>

</body>
</html>
