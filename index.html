<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cineplay</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  color:white;
  font-family:Arial, sans-serif;
}

/* ===== HEADER NETFLIX ===== */
header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 40px;
  background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
  z-index:10;
}

.logo{
  color:#E50914;
  font-size:26px;
  font-weight:900;
  letter-spacing:2px;
}

/* ===== ABAS ===== */
nav{
  display:flex;
  gap:20px;
}

nav button{
  background:none;
  border:none;
  color:#bbb;
  font-size:14px;
  cursor:pointer;
  transition:.3s;
}

nav button:hover{
  color:white;
}

/* ===== MAIN ===== */
main{
  padding-top:100px;
  padding-left:40px;
}

/* ===== SEÇÕES ===== */
.section-title{
  font-size:20px;
  font-weight:800;
  margin:20px 0 10px;
}

/* ===== CARROSSEL NETFLIX ===== */
.cards{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.cards::-webkit-scrollbar{
  display:none;
}

/* ===== POSTER NETFLIX ===== */
.card{
  min-width:180px;
  height:260px;
  border-radius:8px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  position:relative;
  flex-shrink:0;
}

.card:hover{
  transform:scale(1.18);
  z-index:5;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* overlay estilo Netflix */
.card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
}

/* info */
.card-info{
  position:absolute;
  bottom:10px;
  left:10px;
}

.card-title{
  font-size:14px;
  font-weight:bold;
}

.card-meta{
  font-size:12px;
  color:#ccc;
}

</style>
</head>

<body>

<header>

  <div class="logo">CINEPLAY</div>

  <nav>
    <button>Home</button>
    <button>Filmes</button>
    <button>Séries</button>
    <button>Animes</button>
    <button>Canais</button>
  </nav>

</header>

<main>
  <div id="sections"></div>
</main>

<script src="./js/app.js"></script>

</body>
</html>
