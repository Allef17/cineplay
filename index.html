<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cineplay</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  color:white;
  font-family:Arial;
}

/* HEADER */
header{
  padding:20px 40px;
  font-size:28px;
  font-weight:900;
  color:#E50914;
}

/* CONTAINER PRINCIPAL */
main{
  padding:20px 40px;
}

/* SEÇÃO */
.section-title{
  font-size:20px;
  margin:20px 0 10px;
  font-weight:bold;
}

/* CARROSSEL */
.cards{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding-bottom:10px;
}

.cards::-webkit-scrollbar{
  display:none;
}

/* CARD NETFLIX */
.card{
  min-width:200px;
  height:120px;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
  position:relative;
}

.card:hover{
  transform:scale(1.15);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* OVERLAY */
.card-info{
  position:absolute;
  bottom:10px;
  left:10px;
  z-index:2;
}

.card-title{
  font-weight:bold;
  font-size:14px;
}

.card-meta{
  font-size:12px;
  color:#ccc;
}

.card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.8), transparent);
}

</style>
</head>

<body>

<header>CINEPLAY</header>

<main>
  <div id="sections"></div>
</main>

<script src="./js/app.js"></script>

</body>
</html>
