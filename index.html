<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cineplay</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  color:white;
  font-family:Arial;
}

/* HEADER */
header{
  padding:20px;
  color:#E50914;
  font-size:24px;
  font-weight:900;
}

/* TOPBAR (abas + busca) */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 20px 10px 20px;
  gap:10px;
  flex-wrap:wrap;
}

/* ABAS */
.tabs{
  display:flex;
  gap:10px;
}

.tabs button{
  background:none;
  border:1px solid #333;
  color:white;
  padding:6px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:.2s;
}

.tabs button:hover{
  border-color:#E50914;
  color:#E50914;
}

/* BUSCA */
#search{
  padding:8px 12px;
  border-radius:6px;
  border:none;
  outline:none;
  width:180px;
}

/* GRID DE CONTEÚDO */
.row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 20px;
}

.row::-webkit-scrollbar{
  display:none;
}

/* CARD */
.card{
  min-width:160px;
  height:240px;
  cursor:pointer;
  transition:.2s;
}

.card:hover{
  transform:scale(1.05);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:8px;
}

</style>
</head>

<body>

<header>CINEPLAY</header>

<!-- NOVO: ABAS + BUSCA -->
<div class="topbar">

  <div class="tabs">
    <button onclick="setTab('home')">Home</button>
    <button onclick="setTab('movie')">Filmes</button>
    <button onclick="setTab('serie')">Séries</button>
    <button onclick="setTab('anime')">Animes</button>
  </div>

  <input id="search" placeholder="Buscar..." oninput="search()">

</div>

<!-- CONTEÚDO -->
<div id="app"></div>

<script src="./js/app.js"></script>

</body>
</html>
