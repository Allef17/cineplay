<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cineplay</title>

<style>

body{
  margin:0;
  background:#141414;
  color:white;
  font-family:Arial;
}

header{
  padding:20px;
  background:#000;
  font-size:22px;
  font-weight:bold;
  color:#e50914;
}

/* ESSENCIAL PRO JS */
#sections{
  padding:20px;
}

/* CARDS */
.cards{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.card{
  min-width:200px;
  height:120px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  position:relative;
  transition:.3s;
}

.card:hover{
  transform:scale(1.1);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(to top, rgba(0,0,0,.8), transparent);
}

.card-info{
  position:absolute;
  bottom:10px;
  left:10px;
}

.card-title{
  font-weight:bold;
}

.card-meta{
  font-size:12px;
  color:#ccc;
}

.section-title{
  font-size:20px;
  margin-bottom:10px;
}

</style>
</head>

<body>

<header>
  Cineplay
</header>

<!-- IMPORTANTE PRO JS -->
<div id="sections"></div>

<script src="./js/app.js"></script>

</body>
</html>
