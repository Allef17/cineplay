<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cineplay</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  color:white;
  font-family:Arial;
}

header{
  padding:20px;
  color:#E50914;
  font-size:24px;
  font-weight:900;
}

.title{
  margin:20px;
}

.row{
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 20px;
}

.row::-webkit-scrollbar{display:none}

.card{
  min-width:160px;
  height:240px;
  cursor:pointer;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:8px;
}

</style>
</head>

<body>

<header>CINEPLAY</header>

<div id="app"></div>

<script src="./js/app.js"></script>

</body>
</html>
