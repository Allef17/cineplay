<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cineplay</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

<!-- 🎨 SÓ CSS (NÃO MEXE NA ESTRUTURA) -->
<style>

:root{
  --bg:#141414;
  --red:#E50914;
  --white:#fff;
  --gray:#b3b3b3;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Inter, sans-serif;
}

body{
  background:var(--bg);
  color:var(--white);
  overflow-x:hidden;
}

/* HEADER (SEM MEXER NO HTML) */
header{
  position:fixed;
  top:0;
  width:100%;
  z-index:100;
  display:flex;
  justify-content:space-between;
  padding:18px 40px;
  background:linear-gradient(to bottom, rgba(0,0,0,.9), transparent);
  backdrop-filter:blur(8px);
}

.logo{
  color:var(--red);
  font-size:34px;
  font-weight:900;
}

/* NAV */
nav button{
  background:none;
  border:none;
  color:var(--gray);
  margin-right:15px;
  cursor:pointer;
}

nav button:hover{
  color:white;
}

/* HERO (SEM ALTERAR HTML) */
.hero-slide img{
  filter:brightness(.75);
}

.hero-title{
  font-size:60px;
  font-weight:900;
}

.hero-buttons button{
  border-radius:8px;
}

/* SEÇÕES (APENAS VISUAL) */
.section{
  padding:0 40px;
  margin-bottom:40px;
}

.section-title{
  font-size:22px;
  font-weight:800;
}

.cards{
  display:flex;
  gap:12px;
  overflow-x:auto;
}

.cards::-webkit-scrollbar{
  display:none;
}

/* CARD NETFLIX STYLE */
.card{
  min-width:210px;
  height:125px;
  border-radius:10px;
  overflow:hidden;
  transition:.3s;
}

.card:hover{
  transform:scale(1.12);
}

/* IPTV */
.channels-title{
  font-size:26px;
  font-weight:900;
}

.channel-btn:hover{
  background:#E50914;
}

</style>

</head>

<body>

<!-- 🔴 NADA FOI MEXIDO AQUI -->
<!-- SPLASH -->
<div id="splash">
  <h1>CINEPLAY</h1>
</div>

<audio id="introSound">
  <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3?filename=cinematic-logo-110211.mp3">
</audio>

<header>
  <div class="left-header">
    <div class="logo">CINEPLAY</div>

    <nav>
      <button>Home</button>
      <button>Filmes</button>
      <button>Séries</button>
      <button>Animes</button>
      <button>Canais</button>
    </nav>
  </div>

  <div class="clock">
    <div class="clock-time" id="time"></div>
    <div class="clock-date" id="date"></div>
  </div>
</header>

<!-- HERO (INTACTO) -->
<section class="hero">

  <div class="hero-slide active">
    <img src="https://images.unsplash.com/photo-1489599849927-2ee91cede3ba">
    <div class="overlay"></div>

    <div class="hero-content">
      <div class="hero-title">Horizonte Final</div>
      <div class="hero-buttons">
        <button class="play-btn">▶ Assistir</button>
      </div>
    </div>
  </div>

</section>

<!-- 🔥 ISSO NÃO PODE SER ALTERADO -->
<main>
  <div id="sections"></div>
</main>

<section class="channels-section">

  <div class="channels-title">Canais Ao Vivo</div>

  <div class="channels-layout">

    <div class="channel-list">
      <button class="channel-btn">Globo HD</button>
      <button class="channel-btn">SBT</button>
    </div>

  </div>

</section>

<!-- JS ORIGINAL (INTACTO) -->
<script src="./js/app.js"></script>

</body>
</html>
