<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cineplay</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  color:white;
  font-family:Arial;
}

header{
  padding:20px;
  font-size:28px;
  font-weight:900;
  color:#E50914;
}

#hero{
  height:60vh;
  position:relative;
  overflow:hidden;
}

.hero-item{
  position:absolute;
  inset:0;
  opacity:0;
  transition:1s;
}

.hero-item.active{
  opacity:1;
}

.hero-item img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.6);
}

.hero-text{
  position:absolute;
  bottom:60px;
  left:40px;
}

main{
  padding:20px;
}

.section-title{
  font-size:20px;
  margin:20px 0 10px;
  font-weight:bold;
}

.cards{
  display:flex;
  gap:10px;
  overflow-x:auto;
}

.card{
  min-width:200px;
  height:120px;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.card:hover{
  transform:scale(1.15);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

</style>

</head>

<body>

<header>CINEPLAY</header>

<section id="hero"></section>

<main>
  <div id="sections"></div>
</main>

<script src="./js/app.js"></script>

</body>
</html>
