<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Cineplay TV</title>

<style>

body{
  margin:0;
  background:#0B0B0B;
  color:white;
  font-family:Arial;
}

/* SPLASH */
#splash{
  position:fixed;
  inset:0;
  background:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  animation:fade 1s ease 3s forwards;
}

#splash h1{
  color:#E50914;
  font-size:60px;
  font-weight:900;
}

@keyframes fade{to{opacity:0;visibility:hidden}}

/* HEADER */
header{
  display:flex;
  justify-content:space-between;
  padding:20px;
  font-size:22px;
  font-weight:900;
  color:#E50914;
}

/* TOPBAR */
.topbar{
  display:flex;
  justify-content:space-between;
  padding:0 20px;
  align-items:center;
  flex-wrap:wrap;
}

.tabs button{
  background:none;
  border:1px solid #333;
  color:white;
  padding:8px 14px;
  border-radius:20px;
  margin-right:8px;
  cursor:pointer;
}

.tabs button:hover{
  border-color:#E50914;
  color:#E50914;
}

#search{
  padding:8px 12px;
  border-radius:20px;
  border:none;
  background:#1c1c1c;
  color:white;
}

/* HERO CARROSSEL */
.hero{
  height:60vh;
  position:relative;
  overflow:hidden;
}

.hero img{
  width:100%;
  height:100%;
  object-fit:cover;
  filter:brightness(.5);
}

/* ROWS */
.row{
  display:flex;
  gap:12px;
  overflow-x:auto;
  padding:20px;
}

.row::-webkit-scrollbar{display:none}

/* CARD */
.card{
  min-width:160px;
  height:240px;
  border-radius:10px;
  overflow:hidden;
  position:relative;
  transition:.3s;
  cursor:pointer;
}

.card:hover{
  transform:scale(1.12);
  z-index:2;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card-title{
  position:absolute;
  bottom:10px;
  left:10px;
  font-size:12px;
}

.clock{
  font-size:14px;
  color:#aaa;
}

</style>
</head>

<body>

<div id="splash"><h1>CINEPLAY</h1></div>

<header>
  Cineplay TV
  <div class="clock" id="clock"></div>
</header>

<div class="topbar">

  <div class="tabs">
    <button onclick="setTab('home')">Home</button>
    <button onclick="setTab('movie')">Filmes</button>
    <button onclick="setTab('serie')">Séries</button>
    <button onclick="setTab('anime')">Animes</button>
    <button onclick="setTab('channel')">Canais</button>
  </div>

  <input id="search" placeholder="Buscar..." oninput="search()">

</div>

<div class="hero" id="hero"></div>

<div id="app"></div>

<script src="./js/app.js"></script>

</body>
</html>
