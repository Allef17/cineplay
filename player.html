<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:black;
}

iframe{
  width:100%;
  height:100%;
  border:none;
}
</style>
</head>

<body>

<iframe id="player"></iframe>

<script>
const url = new URLSearchParams(window.location.search).get('url');
document.getElementById('player').src = decodeURIComponent(url);
</script>

</body>
</html>
